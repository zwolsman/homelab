apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-create-buckets
  namespace: rustfs
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
          envFrom:
            - secretRef:
                name: rustfs-secret
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set rfs http://rustfs-svc:9000 "$RUSTFS_ACCESS_KEY" "$RUSTFS_SECRET_KEY"; do
                echo "waiting for rustfs to become reachable..."
                sleep 3
              done
              mc mb --ignore-existing rfs/netbox
              echo "bucket 'netbox' is ready"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
