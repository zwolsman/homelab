apiVersion: v1
kind: Secret
metadata:
  name: glance-k8s-token
  namespace: glance
  annotations:
    kubernetes.io/service-account.name: glance
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: glance
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: glance
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: glance
subjects:
  - kind: ServiceAccount
    name: glance
    namespace: glance
