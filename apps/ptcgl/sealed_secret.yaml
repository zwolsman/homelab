---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-credentials
  namespace: ptcgl
spec:
  encryptedData:
    password: 
    username: 
  template:
    metadata:
      name: postgres-credentials
      namespace: ptcgl
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: sync-credentials
  namespace: ptcgl
spec:
  encryptedData:
    MIRROR_S3_ACCESS_KEY: 
    MIRROR_S3_ENDPOINT: 
    MIRROR_S3_SECRET_KEY: 
    SPRING_DATASOURCE_PASSWORD: 
    SPRING_DATASOURCE_USERNAME: 
  template:
    metadata:
      name: sync-credentials
      namespace: ptcgl
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: api-credentials
  namespace: ptcgl
spec:
  encryptedData:
    SPRING_DATASOURCE_PASSWORD: 
    SPRING_DATASOURCE_USERNAME: 
  template:
    metadata:
      name: api-credentials
      namespace: ptcgl
    type: Opaque
