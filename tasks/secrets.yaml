version: "3"

vars:
  SEALED_SECRETS_NAMESPACE: kube-system
  SEALED_SECRETS_CONTROLLER: sealed-secrets-controller

tasks:
  seal:from-file:
    desc: "Encrypt a secret from a file using kubeseal. Usage: task seal:from-file NAME=my-secret NAMESPACE=my-ns FILE=./secret.env"
    requires:
      vars: [NAME, NAMESPACE, FILE]
    preconditions:
      - sh: test -f "{{.FILE}}"
        msg: "Secret file '{{.FILE}}' does not exist"
      - sh: command -v kubeseal
        msg: "kubeseal is not installed or not in PATH"
      - sh: command -v kubectl
        msg: "kubectl is not installed or not in PATH"
    vars:
      OUTPUT: '{{.OUTPUT | default (printf "%s-sealed-secret.yaml" .NAME)}}'
    cmds:
      - |
        kubectl create secret generic "{{.NAME}}" \
          --namespace "{{.NAMESPACE}}" \
          --from-file="{{.FILE}}" \
          --dry-run=client \
          -o yaml \
        | kubeseal \
          --controller-name "{{.SEALED_SECRETS_CONTROLLER}}" \
          --controller-namespace "{{.SEALED_SECRETS_NAMESPACE}}" \
          --format yaml \
          > "{{.OUTPUT}}"
      - echo "Sealed secret written to {{.OUTPUT}}"

  seal:from-literals:
    desc: "Encrypt a secret from key=value literals using kubeseal. Usage: task seal:from-literals NAME=my-secret NAMESPACE=my-ns LITERALS='key1=val1 key2=val2'"
    summary: |
      Encrypt a Kubernetes secret from literal key=value pairs using kubeseal.

      Required variables:
        NAME      - Name of the secret
        NAMESPACE - Target namespace
        LITERALS  - Space-separated list of key=value pairs, e.g. 'DB_PASS=secret API_KEY=abc123'

      Optional variables:
        OUTPUT    - Output filename (default: <NAME>-sealed-secret.yaml)

      Example:
        task seal:from-literals NAME=app-secrets NAMESPACE=production LITERALS='DB_PASS=hunter2 TOKEN=abc'
    requires:
      vars: [NAME, NAMESPACE, LITERALS]
    preconditions:
      - sh: command -v kubeseal
        msg: "kubeseal is not installed or not in PATH"
      - sh: command -v kubectl
        msg: "kubectl is not installed or not in PATH"
    vars:
      OUTPUT: '{{.OUTPUT | default (printf "%s-sealed-secret.yaml" .NAME)}}'
      # Build --from-literal flags from space-separated LITERALS var
      FROM_LITERAL_FLAGS:
        sh: echo "{{.LITERALS}}" | tr ' ' '\n' | sed 's/^/--from-literal=/' | tr '\n' ' '
    cmds:
      - |
        kubectl create secret generic "{{.NAME}}" \
          --namespace "{{.NAMESPACE}}" \
          {{.FROM_LITERAL_FLAGS}} \
          --dry-run=client \
          -o yaml \
        | kubeseal \
          --controller-name "{{.SEALED_SECRETS_CONTROLLER}}" \
          --controller-namespace "{{.SEALED_SECRETS_NAMESPACE}}" \
          --format yaml \
          > "{{.OUTPUT}}"
      - echo "Sealed secret written to {{.OUTPUT}}"

  seal:fetch-cert:
    desc: "Fetch and cache the kubeseal public certificate from the cluster"
    vars:
      CERT_FILE: '{{.CERT_FILE | default "pub-sealed-secrets.pem"}}'
    preconditions:
      - sh: command -v kubeseal
        msg: "kubeseal is not installed or not in PATH"
    cmds:
      - |
        kubeseal \
          --controller-name "{{.SEALED_SECRETS_CONTROLLER}}" \
          --controller-namespace "{{.SEALED_SECRETS_NAMESPACE}}" \
          --fetch-cert \
          > "{{.CERT_FILE}}"
      - echo "Certificate saved to {{.CERT_FILE}}"
